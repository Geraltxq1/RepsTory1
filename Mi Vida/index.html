<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Futura Esposa 🖤</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#0f0f14;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow-x:hidden;
}

.container{
    max-width:1000px;
    padding:50px;
    text-align:center;
}

h1{font-size:42px;margin-bottom:10px;}
.nombre{color:#ff4d6d;}

.typewriter{
    font-size:18px;
    margin:20px 0;
    min-height:50px;
}

button{
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:#ff4d6d;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ff1f4d;
    transform:scale(1.05);
}

.contador{
    margin-top:20px;
    color:#ff4d6d;
}

/* ===== SLIDER ===== */

.slider{
    margin-top:40px;
    overflow:hidden;
    width:100%;
}

.slide-track{
    display:flex;
    width:max-content;
    animation:scroll 30s linear infinite;
}

.slide-track img{
    width:250px;
    height:320px;
    object-fit:cover;
    border-radius:15px;
    margin-right:15px;
    box-shadow:0 10px 20px rgba(0,0,0,0.4);
    transition:0.4s;
}

.slide-track img:hover{
    transform:scale(1.06);
}

@keyframes scroll{
    0%{transform:translateX(0);}
    100%{transform:translateX(-50%);}
}

/* fondo animado */
.fondo-animado{
    position:fixed;
    width:100%;
    height:100%;
    background:
        radial-gradient(circle at 20% 30%, rgba(255,77,109,0.2), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(255,77,109,0.2), transparent 40%);
    animation:mov 6s infinite alternate;
    z-index:-1;
}

@keyframes mov{
    from{transform:translateY(-20px);}
    to{transform:translateY(20px);}
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="musica" loop>
    <source src="audio.mp3" type="audio/mpeg">
</audio>

<div class="fondo-animado"></div>

<div class="container">

    <h1>Para <span class="nombre">Mi Pequeño Dinosaurio</span> ❤️🦖</h1>

    <div class="typewriter" id="texto"></div>

    <button onclick="toggleMusica()">🎵 TOCA ACA</button>

    <div class="contador" id="contador"></div>

    <div class="slider">
        <div class="slide-track">

            <!-- fotos -->
            <img src="foto1.jpeg">
            <img src="foto2.jpeg">
            <img src="foto3.jpeg">
            <img src="foto4.jpeg">
            <img src="foto5.jpeg">
            <img src="foto6.jpeg">
            <img src="foto7.jpeg">
            <img src="foto8.jpeg">
            <img src="foto9.jpeg">
            <img src="foto10.jpeg">

            <!-- repetidas para infinito -->
            <img src="foto1.jpeg">
            <img src="foto2.jpeg">
            <img src="foto3.jpeg">
            <img src="foto4.jpeg">
            <img src="foto5.jpeg">
            <img src="foto6.jpeg">
            <img src="foto7.jpeg">
            <img src="foto8.jpeg">
            <img src="foto9.jpeg">
            <img src="foto10.jpeg">

        </div>
    </div>

    <br>
    <footer>Con Amor Para Mi Princesa Hermosa</footer>
    <footer>“Quiero ser ese hombre por el cual tú decidas sonreír todos los días.”</footer>

</div>

<script>

/* ===== TEXTO ===== */
const mensaje =
"Desde que apareciste en mi vida, todo se siente diferente. Más bonito, más tranquilo y más real. En tus ojos encontré mi hogar, un rincón de paz donde quiero estar. Eres mi calma en la tormenta, mi refugio cuando todo tiembla. Siempre tú en cada pensamiento.";
let i = 0;

function escribir(){
    if(i < mensaje.length){
        document.getElementById("texto").innerHTML += mensaje.charAt(i);
        i++;
        setTimeout(escribir,40);
    }
}
escribir();

/* ===== BOTÓN SOLO MÚSICA ===== */
function toggleMusica(){
    const musica = document.getElementById("musica");

    if(musica.paused){
        musica.play();
    } else {
        musica.pause();
    }
}

/* ===== CONTADOR ===== */
const fechaInicio = new Date("2022-09-10");

function actualizarContador(){
    const hoy = new Date();
    const dias = Math.floor((hoy - fechaInicio)/(1000*60*60*24));
    document.getElementById("contador").innerText =
        dias + " días construyendo un bonito futuro contigo.";
}
actualizarContador();

</script>

</body>
</html>
