<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LabMetrics - Configuración</title>
<style>
:root{
  --bg:#0b0f19;
  --card:#111827;
  --border:#1f2937;
  --text:#f8fafc;
  --muted:#94a3b8;
  --primary:#4f46e5;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif;}

body{
  display:flex;
  height:100vh;
  background:var(--bg);
  color:var(--text);
}

/* SIDEBAR GLOBAL */
.sidebar{
  width:240px;
  background:#0a0f1a;
  border-right:1px solid var(--border);
  padding:20px;
}
.menu a{
  display:block;
  padding:12px;
  margin-bottom:6px;
  border-radius:8px;
  color:var(--muted);
  text-decoration:none;
}
.menu a.active{
  background:var(--card);
  color:white;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* HEADER GLOBAL */
.header{
  height:70px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 30px;
}

/* CONTENT */
.content{
  padding:25px 30px;
}

/* TABS CONFIG */
.tabs{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.tab{
  padding:10px 16px;
  background:#0f172a;
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--muted);
  cursor:pointer;
}

.tab.active{
  background:var(--primary);
  color:white;
  border-color:var(--primary);
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:20px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>🧪 LabMetrics</h3>
  <div class="menu">
    <a href="#">Dashboard</a>
    <a href="#">Muestras</a>
    <a href="#">Análisis</a>
    <a href="#">Reportes</a>
    <a class="active" href="#">Configuración</a>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="header">
    <h3>Configuración</h3>
  </div>

  <div class="content">

    <!-- NAV SUPERIOR CORRECTA -->
    <div class="tabs">
      <div class="tab active">Empresa</div>
      <div class="tab">Usuarios</div>
      <div class="tab">Tipos análisis</div>
      <div class="tab">Parámetros</div>
    </div>

    <!-- CONTENIDO DINÁMICO -->
    <div class="card">
      <h2>Información de la empresa</h2>
      <p style="color:#94a3b8;margin-top:8px;">
        Aquí va el contenido dependiendo de la pestaña seleccionada.
      </p>
    </div>

  </div>
</div>

</body>
</html>
