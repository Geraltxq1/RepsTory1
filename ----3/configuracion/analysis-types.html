<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LabMetrics - Tipos de análisis</title>
<style>
body{margin:0;font-family:Inter;background:#0b0f19;color:#fff;padding:25px;}
.card{background:#111827;border:1px solid #1f2937;border-radius:12px;padding:20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;}
.type-card{background:#0f172a;padding:15px;border-radius:10px;border:1px solid #1f2937;}
.btn{background:#4f46e5;color:white;padding:8px 12px;border:none;border-radius:8px;}
</style>
</head>
<body>

<div class="card">
  <h2>Tipos de análisis</h2>
  <button class="btn">➕ Crear tipo</button>

  <div class="grid" style="margin-top:15px;">
    <div class="type-card">
      <h3>Análisis de Agua</h3>
      <p style="color:#94a3b8;">pH, Turbidez, Cloro</p>
    </div>

    <div class="type-card">
      <h3>Clínico</h3>
      <p style="color:#94a3b8;">Glucosa, Hemoglobina</p>
    </div>

    <div class="type-card">
      <h3>Industrial</h3>
      <p style="color:#94a3b8;">Pureza, Temperatura</p>
    </div>
  </div>
</div>

</body>
</html>
