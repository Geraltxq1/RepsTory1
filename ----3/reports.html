<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LabMetrics - Reportes</title>

<style>
:root{
  --bg:#0b0f19;
  --card:#111827;
  --border:#1f2937;
  --text:#f8fafc;
  --muted:#94a3b8;
  --primary:#4f46e5;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif;}

body{
  background:var(--bg);
  color:var(--text);
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#0a0f1a;
  border-right:1px solid var(--border);
  padding:20px;
}

.logo{font-size:20px;font-weight:700;margin-bottom:30px;}

.menu a{
  display:block;
  padding:12px;
  margin-bottom:8px;
  border-radius:8px;
  color:var(--muted);
  text-decoration:none;
}

.menu a.active{background:var(--card);color:white;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;}

.header{
  height:70px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 30px;
}

.content{
  padding:25px 30px;
  overflow:auto;
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:18px;
}

.filters{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:12px;
  margin-bottom:20px;
}

input, select{
  width:100%;
  background:#0f172a;
  border:1px solid var(--border);
  color:white;
  padding:10px;
  border-radius:8px;
}

/* LAYOUT */
.grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:15px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th, td{
  padding:12px;
  border-bottom:1px solid var(--border);
  font-size:14px;
}

th{color:var(--muted);}

.status{
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
}

.done{background:#14532d;color:#4ade80;}
.pending{background:#78350f;color:#facc15;}

.btn{
  background:var(--primary);
  color:white;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:13px;
}

/* PREVIEW */
.preview{
  height:250px;
  background:linear-gradient(180deg,#1f2937,#111827);
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--muted);
  margin-top:10px;
}

@media(max-width:900px){
  .sidebar{display:none;}
  .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">🧪 LabMetrics</div>
  <div class="menu">
    <a href="#">Dashboard</a>
    <a href="#">Muestras</a>
    <a href="#">Análisis</a>
    <a class="active" href="#">Reportes</a>
    <a href="#">Configuración</a>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="header">
    <h3>Reportes</h3>
    <button class="btn">📄 Nuevo reporte</button>
  </div>

  <div class="content">

    <!-- FILTROS -->
    <div class="card">
      <h3>Filtros</h3>

      <div class="filters" style="margin-top:12px;">
        <select>
          <option>Tipo de análisis</option>
        </select>
        <input type="date">
        <input type="date">
        <select>
          <option>Estado</option>
        </select>
      </div>
    </div>

    <div class="grid" style="margin-top:15px;">

      <!-- HISTORIAL -->
      <div class="card">
        <h3>Historial de Reportes</h3>

        <table>
          <tr>
            <th>ID</th>
            <th>Tipo</th>
            <th>Fecha</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>

          <tr>
            <td>#R-001</td>
            <td>Agua</td>
            <td>02/03/2026</td>
            <td><span class="status done">Listo</span></td>
            <td>
              <button class="btn">PDF</button>
              <button class="btn">Excel</button>
            </td>
          </tr>

          <tr>
            <td>#R-002</td>
            <td>Clínico</td>
            <td>01/03/2026</td>
            <td><span class="status done">Listo</span></td>
            <td>
              <button class="btn">PDF</button>
            </td>
          </tr>

          <tr>
            <td>#R-003</td>
            <td>Industrial</td>
            <td>28/02/2026</td>
            <td><span class="status pending">Generando</span></td>
            <td>—</td>
          </tr>
        </table>

      </div>

      <!-- PREVIEW -->
      <div class="card">
        <h3>Vista previa</h3>
        <div class="preview">📊 Preview del reporte</div>

        <button class="btn" style="margin-top:15px;width:100%;">
          Descargar PDF
        </button>
      </div>

    </div>

  </div>
</div>

</body>
</html>
